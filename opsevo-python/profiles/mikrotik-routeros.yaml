vendor: MikroTik
model: RouterOS
driver_type: api
base_url: "https://{{host}}:{{port}}"
auth:
  type: basic
timeout: 30000

endpoints:
  # ── 系统 ──
  - action_type: get_system_resource
    path: /rest/system/resource
    method: GET
    read_only: true
    risk_level: low
    response_transform: routeros_json
  - action_type: get_system_identity
    path: /rest/system/identity
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_routerboard
    path: /rest/system/routerboard
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_health
    path: /rest/system/health
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_clock
    path: /rest/system/clock
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_ntp_client
    path: /rest/system/ntp/client
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_logging
    path: /rest/system/logging
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_history
    path: /rest/system/history
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_package
    path: /rest/system/package
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_scheduler
    path: /rest/system/scheduler
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_script
    path: /rest/system/script
    method: GET
    read_only: true
    risk_level: low

  # ── 网络接口 ──
  - action_type: get_interfaces
    path: /rest/interface
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_ethernet
    path: /rest/interface/ethernet
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_bridge
    path: /rest/interface/bridge
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_bridge_port
    path: /rest/interface/bridge/port
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_vlan
    path: /rest/interface/vlan
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_bonding
    path: /rest/interface/bonding
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_wireless
    path: /rest/interface/wireless
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_wireless_registration
    path: /rest/interface/wireless/registration-table
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_pppoe_client
    path: /rest/interface/pppoe-client
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_wireguard
    path: /rest/interface/wireguard
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_wireguard_peers
    path: /rest/interface/wireguard/peers
    method: GET
    read_only: true
    risk_level: low

  # ── IP ──
  - action_type: get_ip_addresses
    path: /rest/ip/address
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_ip_pool
    path: /rest/ip/pool
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_ip_arp
    path: /rest/ip/arp
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_ip_neighbor
    path: /rest/ip/neighbor
    method: GET
    read_only: true
    risk_level: low

  # ── 路由 ──
  - action_type: get_routes
    path: /rest/ip/route
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_routing_ospf_instance
    path: /rest/routing/ospf/instance
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_routing_ospf_neighbor
    path: /rest/routing/ospf/neighbor
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_routing_bgp_connection
    path: /rest/routing/bgp/connection
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_routing_bgp_session
