vendor: OpenWrt
model: OpenWrt
driver_type: ssh
base_url: ""
auth:
  type: password
timeout: 30000

endpoints:
  # ── 系统信息 ──
  - action_type: get_system_resource
    path: >-
      echo '=== BOARD ===';
      ubus call system board;
      echo '=== UPTIME ===';
      cat /proc/uptime;
      echo '=== CPU ===';
      top -bn1 | head -5;
      echo '=== MEMORY ===';
      free;
      echo '=== LOAD ===';
      cat /proc/loadavg
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_info
    path: "ubus call system info"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_system_board
    path: "ubus call system board"
    method: GET
    read_only: true
    risk_level: low

  # ── 网络接口 ──
  - action_type: get_interfaces
    path: "ubus call network.interface dump"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_status
    path: >-
      echo '=== IP LINK ===';
      ip -s link;
      echo '=== IP ADDR ===';
      ip addr show
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_interface_detail
    path: >-
      for iface in $(uci show network | grep '=interface' | cut -d. -f2 | cut -d= -f1); do
        echo "=== $iface ===";
        ubus call network.interface.$iface status 2>/dev/null;
      done
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_switch_config
    path: "swconfig list 2>/dev/null; swconfig dev switch0 show 2>/dev/null"
    method: GET
    read_only: true
    risk_level: low

  # ── IP 地址 ──
  - action_type: get_ip_addresses
    path: "ip -4 addr show; echo '=== IPv6 ==='; ip -6 addr show"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_arp_table
    path: "ip neigh show"
    method: GET
    read_only: true
    risk_level: low

  # ── 路由 ──
  - action_type: get_routes
    path: "ip route show"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_ipv6_routes
    path: "ip -6 route show"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_routing_table
    path: "ip route show table all | head -200"
    method: GET
    read_only: true
    risk_level: low

  # ── 防火墙 ──
  - action_type: get_firewall_rules
    path: "uci show firewall"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_firewall_zones
    path: "uci show firewall | grep 'firewall.@zone'"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_firewall_redirects
    path: "uci show firewall | grep 'firewall.@redirect'"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_iptables
    path: >-
      echo '=== IPTABLES ===';
      iptables -L -n -v 2>/dev/null;
      echo '=== NAT ===';
      iptables -t nat -L -n -v 2>/dev/null;
      echo '=== NFT ===';
      nft list ruleset 2>/dev/null
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_firewall_connections
    path: "cat /proc/net/nf_conntrack 2>/dev/null | wc -l; echo 'active connections'; head -20 /proc/net/nf_conntrack 2>/dev/null"
    method: GET
    read_only: true
    risk_level: low

  # ── DNS / DHCP ──
  - action_type: get_dns
    path: >-
      echo '=== DHCP/DNS CONFIG ===';
      uci show dhcp;
      echo '=== RESOLV ===';
      cat /tmp/resolv.conf.d/resolv.conf.auto 2>/dev/null;
      echo '=== DNSMASQ ===';
      cat /etc/dnsmasq.conf 2>/dev/null
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_dhcp_leases
    path: >-
      echo '=== ACTIVE LEASES ===';
      cat /tmp/dhcp.leases 2>/dev/null;
      echo '=== STATIC LEASES ===';
      uci show dhcp | grep 'host'
    method: GET
    read_only: true
    risk_level: low

  # ── 无线 ──
  - action_type: get_wireless
    path: >-
      echo '=== UCI CONFIG ===';
      uci show wireless;
      echo '=== IWINFO ===';
      iwinfo
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_wireless_clients
    path: >-
      for iface in $(iwinfo | grep ESSID | awk '{print $1}'); do
        echo "=== $iface ===";
        iwinfo $iface assoclist;
      done
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_wireless_survey
    path: >-
      for iface in $(iwinfo | grep ESSID | awk '{print $1}'); do
        echo "=== $iface scan ===";
        iwinfo $iface scan 2>/dev/null | head -50;
      done
    method: GET
    read_only: true
    risk_level: low

  # ── VPN ──
  - action_type: get_vpn_status
    path: >-
      echo '=== WIREGUARD ===';
      wg show 2>/dev/null || echo 'wireguard not installed';
      echo '=== OPENVPN ===';
      uci show openvpn 2>/dev/null || echo 'openvpn not configured'
    method: GET
    read_only: true
    risk_level: low

  # ── 磁盘 / 存储 ──
  - action_type: get_disk_usage
    path: >-
      echo '=== DISK ===';
      df -h;
      echo '=== OVERLAY ===';
      df -h /overlay 2>/dev/null;
      echo '=== TMP ===';
      df -h /tmp
    method: GET
    read_only: true
    risk_level: low

  # ── 连接 / 端口 ──
  - action_type: get_connections
    path: "netstat -tunap 2>/dev/null || ss -tunap 2>/dev/null"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_listening_ports
    path: "netstat -tlnp 2>/dev/null || ss -tlnp 2>/dev/null"
    method: GET
    read_only: true
    risk_level: low

  # ── 日志 ──
  - action_type: get_syslog
    path: "logread -l 100"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_kernel_log
    path: "dmesg | tail -50"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_firewall_log
    path: "logread | grep -i 'drop\\|reject\\|fw' | tail -50"
    method: GET
    read_only: true
    risk_level: low

  # ── 服务 ──
  - action_type: get_services
    path: >-
      for svc in /etc/init.d/*; do
        name=$(basename $svc);
        enabled=$($svc enabled 2>/dev/null && echo 'enabled' || echo 'disabled');
        echo "$name: $enabled";
      done
    method: GET
    read_only: true
    risk_level: low

  # ── 软件包 ──
  - action_type: get_packages
    path: "opkg list-installed"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_upgradable_packages
    path: "opkg list-upgradable 2>/dev/null"
    method: GET
    read_only: true
    risk_level: low

  # ── UCI 全量配置 ──
  - action_type: get_uci_network
    path: "uci show network"
    method: GET
    read_only: true
    risk_level: low
  - action_type: get_uci_system
    path: "uci show system"
    method: GET
    read_only: true
    risk_level: low

  # ── 配置导出 ──
  - action_type: export_config
    path: "sysupgrade -b - | base64"
    method: GET
    read_only: true
    risk_level: medium

  # ── 写操作 ──
  - action_type: restart_network
    path: "/etc/init.d/network restart"
    method: POST
    read_only: false
    risk_level: high
  - action_type: restart_firewall
    path: "/etc/init.d/firewall restart"
    method: POST
    read_only: false
    risk_level: high
  - action_type: restart_wireless
    path: "wifi reload"
    method: POST
    read_only: false
    risk_level: medium
  - action_type: restart_dnsmasq
    path: "/etc/init.d/dnsmasq restart"
    method: POST
    read_only: false
    risk_level: medium
  - action_type: restart_service
    path: "/etc/init.d/{service_name} restart"
    method: POST
    read_only: false
    risk_level: high
  - action_type: uci_commit
    path: "uci commit"
    method: POST
    read_only: false
    risk_level: high
  - action_type: reboot
    path: "reboot"
    method: POST
    read_only: false
    risk_level: critical

metrics_endpoints:
  cpu_usage: get_system_resource
  memory_usage: get_system_info
  interfaces: get_interface_status
  disk: get_disk_usage
  wireless: get_wireless_clients

data_capabilities:
  - topology
  - routes
  - interfaces
  - firewall
  - dns
  - dhcp
  - wireless
  - vpn
  - packages
  - syslog
  - services
  - connections
  - disk

config_paths:
  - get_interfaces
  - get_firewall_rules
  - get_firewall_redirects
  - get_dns
  - get_wireless
  - get_routes
  - get_ip_addresses
  - get_uci_network
  - get_uci_system
  - get_vpn_status
  - export_config

severity_mapping:
  critical:
    - emerg
    - alert
    - crit
  warning:
    - err
    - warning
  info:
    - notice
    - info
    - debug

remediation_templates:
  interface_down: |
    ifup {interface_name}
  high_cpu: |
    for pid in $(top -bn1 | awk 'NR>4 && $7+0>80 {print $1}' | head -3); do kill -9 $pid; done
  high_memory: |
    sync; echo 3 > /proc/sys/vm/drop_caches
  dns_not_resolving: |
    /etc/init.d/dnsmasq restart
  wireless_down: |
    wifi reload
  wireless_interference: |
    uci set wireless.radio0.channel=auto; uci commit wireless; wifi reload
  firewall_lockout: |
    /etc/init.d/firewall restart
  disk_full: |
    rm -rf /tmp/opkg-lists/*; opkg clean
  service_down: |
    /etc/init.d/{service_name} restart
  dhcp_pool_exhausted: |
    uci set dhcp.lan.limit=200; uci commit dhcp; /etc/init.d/dnsmasq restart
  vpn_tunnel_down: |
    /etc/init.d/wireguard restart 2>/dev/null; /etc/init.d/openvpn restart 2>/dev/null

script_language: ash
