<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 0 62 62" width="64" height="64">
  <!-- AI Robot Head -->
  <rect x="16" y="8" width="32" height="28" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  
  <!-- Robot Eyes -->
  <circle cx="24" cy="20" r="4" fill="#FFFFFF"/>
  <circle cx="40" cy="20" r="4" fill="#FFFFFF"/>
  <circle cx="25" cy="20" r="2" fill="#1A1A2E"/>
  <circle cx="41" cy="20" r="2" fill="#1A1A2E"/>
  
  <!-- Robot Mouth/Display -->
  <rect x="22" y="28" width="20" height="4" rx="2" fill="#00D4AA"/>
  
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="2" stroke="#2C5F8A" stroke-width="2"/>
  <circle cx="32" cy="2" r="2" fill="#00D4AA"/>
  
  <!-- Robot Body -->
  <rect x="20" y="38" width="24" height="16" rx="4" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  
  <!-- Robot Arms -->
  <rect x="8" y="40" width="10" height="6" rx="3" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  <rect x="46" y="40" width="10" height="6" rx="3" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
  
  <!-- Network Ball (held by right arm) -->
  <circle cx="54" cy="52" r="10" fill="#FF6B6B" stroke="#CC5555" stroke-width="2"/>
  
  <!-- Network Lines on Ball -->
  <ellipse cx="54" cy="52" rx="10" ry="4" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
  <ellipse cx="54" cy="52" rx="4" ry="10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="52" x2="64" y2="52" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
  <line x1="54" y1="42" x2="54" y2="62" stroke="#FFFFFF" stroke-width="1" opacity="0.7"/>
  
  <!-- Network Nodes on Ball -->
  <circle cx="48" cy="48" r="1.5" fill="#FFFFFF"/>
  <circle cx="60" cy="48" r="1.5" fill="#FFFFFF"/>
  <circle cx="54" cy="44" r="1.5" fill="#FFFFFF"/>
  <circle cx="54" cy="60" r="1.5" fill="#FFFFFF"/>
  <circle cx="48" cy="56" r="1.5" fill="#FFFFFF"/>
  <circle cx="60" cy="56" r="1.5" fill="#FFFFFF"/>
  
  <!-- AI Symbol on Robot Chest -->
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">AI</text>
</svg>