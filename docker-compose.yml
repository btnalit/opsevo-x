services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: opsevo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-opsevo}
      POSTGRES_USER: ${PG_USER:-opsevo}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-opsevo123}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql:ro
    networks:
      - opsevo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-opsevo} -d ${PG_DATABASE:-opsevo}"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 60s

  opsevo:
    image: ghcr.io/btnalit/opsevo-x:latest
    container_name: opsevo
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:3099"
      - "${SYSLOG_PORT:-514}:514/udp"
      - "${SNMP_TRAP_PORT:-162}:162/udp"
    environment:
      - DATABASE_URL=postgresql://${PG_USER:-opsevo}:${PG_PASSWORD:-opsevo123}@postgres:5432/${PG_DATABASE:-opsevo}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-changeme-internal-key}
    volumes:
      - opsevo-data:/app/data
      - opsevo-logs:/app/logs
    networks:
      - opsevo-network
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3099/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  opsevo-data:
    name: opsevo-data
  opsevo-logs:
    name: opsevo-logs
  pgdata:
    name: opsevo-pgdata

networks:
  opsevo-network:
    name: opsevo-network
    driver: bridge
